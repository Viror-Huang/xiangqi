        alert("导入失败：请选择有效的 training-data.json 文件。");
      } finally {
        importJsonFileEl.value = "";
      }
    }

    function loadLearnBook() {
      try {
        return JSON.parse(localStorage.getItem(LEARN_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function saveLearnBook() {
      try {
        // 控制大小，只保留强经验
        const entries = Object.entries(learnBook);
        if (entries.length > 5000) {
          entries.sort((a, b) => maxAbsBucket(b[1]) - maxAbsBucket(a[1]));
          learnBook = Object.fromEntries(entries.slice(0, 5000));
        }
        localStorage.setItem(LEARN_KEY, JSON.stringify(learnBook));
      } catch {}
      updateTrainingInfo();
    }

    function maxAbsBucket(bucket) {
      return Math.max(...Object.values(bucket).map(v => Math.abs(v)), 0);
    }

    function updateTrainingInfo() {
      const count = Object.keys(learnBook).length;
      trainTextEl.textContent = training ? trainTextEl.textContent : `本地训练：${count} 条经验`;
      if (!training) trainFillEl.style.width = `${Math.min(100, count / 20)}%`;
    }

    function generateAllLegalMoves(b, color) {
      const result = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = b[r][c];
          if (!p || p.color !== color) continue;
          const moves = getLegalMoves(b, r, c);
          for (const to of moves) {
            result.push({ from: { r, c }, to });
          }
        }
      }
      return result;
    }

    function generateTacticalMoves(b, color) {
      return generateAllLegalMoves(b, color).filter(move => isTacticalMove(b, move, color));
    }

    function getLegalMoves(b, r, c) {
      const p = b[r][c];
      if (!p) return [];
      const pseudo = getPseudoMoves(b, r, c);

      return pseudo.filter(m => {
        const next = cloneBoard(b);
        next[m.r][m.c] = next[r][c];
        next[r][c] = null;
        return !isInCheck(next, p.color);
      });
    }

    function getPseudoMoves(b, r, c) {
      const p = b[r][c];
      if (!p) return [];
      switch (p.type) {
        case "k": return kingMoves(b, r, c, p.color);
        case "a": return advisorMoves(b, r, c, p.color);
        case "b": return elephantMoves(b, r, c, p.color);
        case "n": return horseMoves(b, r, c, p.color);
        case "r": return rookMoves(b, r, c, p.color);
        case "c": return cannonMoves(b, r, c, p.color);
        case "p": return pawnMoves(b, r, c, p.color);
        default: return [];
      }
    }

    function kingMoves(b, r, c, color) {
      const result = [];
      for (const [dr, dc] of [[1,0], [-1,0], [0,1], [0,-1]]) {
        const nr = r + dr, nc = c + dc;
        if (inPalace(nr, nc, color)) addIfAvailable(result, b, nr, nc, color);
      }

      // 将帅照面
      for (let nr = r + (color === "red" ? -1 : 1); inBounds(nr, c); nr += (color === "red" ? -1 : 1)) {
        if (!b[nr][c]) continue;
        if (b[nr][c].type === "k" && b[nr][c].color !== color) result.push({ r: nr, c });
        break;
      }

      return result;
    }

    function advisorMoves(b, r, c, color) {
      const result = [];
      for (const [dr, dc] of [[1,1], [1,-1], [-1,1], [-1,-1]]) {
        const nr = r + dr, nc = c + dc;
        if (inPalace(nr, nc, color)) addIfAvailable(result, b, nr, nc, color);
      }
      return result;
    }

    function elephantMoves(b, r, c, color) {
      const result = [];
      for (const [dr, dc] of [[2,2], [2,-2], [-2,2], [-2,-2]]) {
        const nr = r + dr, nc = c + dc;
        const eyeR = r + dr / 2, eyeC = c + dc / 2;
        if (!inBounds(nr, nc)) continue;
        if (color === "red" && nr < 5) continue;
        if (color === "black" && nr > 4) continue;
        if (b[eyeR][eyeC]) continue;
        addIfAvailable(result, b, nr, nc, color);
      }
      return result;
    }

    function horseMoves(b, r, c, color) {
      const result = [];
      const candidates = [
        { dr: 2, dc: 1, leg: [1, 0] }, { dr: 2, dc: -1, leg: [1, 0] },
        { dr: -2, dc: 1, leg: [-1, 0] }, { dr: -2, dc: -1, leg: [-1, 0] },
        { dr: 1, dc: 2, leg: [0, 1] }, { dr: -1, dc: 2, leg: [0, 1] },
        { dr: 1, dc: -2, leg: [0, -1] }, { dr: -1, dc: -2, leg: [0, -1] }
      ];

      for (const m of candidates) {
        const nr = r + m.dr, nc = c + m.dc;
        const lr = r + m.leg[0], lc = c + m.leg[1];
        if (inBounds(nr, nc) && !b[lr][lc]) addIfAvailable(result, b, nr, nc, color);
      }

      return result;
    }

    function rookMoves(b, r, c, color) {
      const result = [];
      for (const [dr, dc] of [[1,0], [-1,0], [0,1], [0,-1]]) {
        let nr = r + dr, nc = c + dc;
        while (inBounds(nr, nc)) {
          if (!b[nr][nc]) {
            result.push({ r: nr, c: nc });
          } else {
            if (b[nr][nc].color !== color) result.push({ r: nr, c: nc });
            break;
          }
          nr += dr; nc += dc;
        }
      }
      return result;
    }

    function cannonMoves(b, r, c, color) {
      const result = [];
      for (const [dr, dc] of [[1,0], [-1,0], [0,1], [0,-1]]) {
        let nr = r + dr, nc = c + dc;
        let screenFound = false;

        while (inBounds(nr, nc)) {
          if (!screenFound) {
            if (!b[nr][nc]) result.push({ r: nr, c: nc });
            else screenFound = true;
          } else {
            if (b[nr][nc]) {
              if (b[nr][nc].color !== color) result.push({ r: nr, c: nc });
              break;
            }
          }
          nr += dr; nc += dc;
        }
      }
      return result;
    }

    function pawnMoves(b, r, c, color) {
      const result = [];
      const forward = color === "red" ? -1 : 1;
      addIfAvailable(result, b, r + forward, c, color);

      if (hasCrossedRiver(color, r)) {
        addIfAvailable(result, b, r, c - 1, color);
        addIfAvailable(result, b, r, c + 1, color);
      }

      return result;
    }

    function addIfAvailable(result, b, r, c, color) {
      if (!inBounds(r, c)) return;
      if (!b[r][c] || b[r][c].color !== color) result.push({ r, c });
    }

    function isTacticalMove(b, move, color) {
      if (b[move.to.r][move.to.c]) return true;
      const next = applyMoveToClone(b, move);
      return isInCheck(next, opposite(color)) || createsBigThreat(next, move.to.r, move.to.c, color);
    }

    function createsBigThreat(b, r, c, color) {
      const p = b[r][c];
      if (!p) return false;

      for (const m of getPseudoMoves(b, r, c)) {
        const target = b[m.r][m.c];
        if (target && target.color !== color && baseValue[target.type] >= 480) return true;
      }

      return false;
    }

    function orderMoves(b, moves, color, aiColor = color, ply = 0, ttMove = null) {
      return [...moves].sort((a, z) => moveScore(b, z, color, aiColor, ply, ttMove) - moveScore(b, a, color, aiColor, ply, ttMove));
    }

    function moveScore(b, move, color, aiColor, ply, ttMove) {
      if (ttMove && sameMove(move, ttMove)) return 1e9;
      if (currentPvMove && sameMove(move, currentPvMove)) return 9e8;

      const p = b[move.from.r][move.from.c];
      const target = b[move.to.r][move.to.c];
      let score = 0;

      if (target) {
        // MVV-LVA：先吃大子，用小子吃大子更优
        score += baseValue[target.type] * 24 - baseValue[p.type] * 0.7;
      } else {
        if (killerMoves[ply] && killerMoves[ply].some(k => sameMove(k, move))) score += 10000;
        score += historyHeuristic.get(moveKey(move)) || 0;
      }

      const next = applyMoveToClone(b, move);
      if (isInCheck(next, opposite(color))) score += 1300;
      if (createsBigThreat(next, move.to.r, move.to.c, color)) score += 520;

      const before = positionalBonus(b, p, move.from.r, move.from.c, gamePhase(b));
      const after = positionalBonus(next, p, move.to.r, move.to.c, gamePhase(next));
      score += (after - before) * 3;

      const attacked = isSquareAttacked(next, move.to.r, move.to.c, opposite(color));
      const defended = isSquareAttacked(next, move.to.r, move.to.c, color, true);

      if (attacked && !defended) score -= baseValue[p.type] * 0.95;
      else if (attacked) score -= baseValue[p.type] * 0.25;

      // 根节点避免优势方主动三次重复；劣势方可以接受和棋。
      if (ply === 0 && typeof boardStateCounts === "object") {
        const repeatKey = repetitionKey(next, opposite(color));
        const repeatCount = boardStateCounts[repeatKey] || 0;
        if (wouldLoseByLongRuleAfterMove(b, move, color)) {
          score -= 100000000;
        } else if (repeatCount >= 2) {
          const relativeScore = evaluateRelative(b, color);
          score += relativeScore < -500 ? 900 : -2200;
        }
      }

      const learn = getLearnScoreForMove(b, color, move);
      score += learn * 160;

      return score;
    }

    function rememberCutoff(move, depth, ply, tactical) {
      if (!move || tactical) return;
      const killers = killerMoves[ply] || (killerMoves[ply] = []);
      if (!killers.some(k => sameMove(k, move))) {
        killers.unshift(move);
        if (killers.length > 2) killers.pop();
      }
      const key = moveKey(move);
      historyHeuristic.set(key, (historyHeuristic.get(key) || 0) + depth * depth * 6);
    }

    function getLearnScoreForMove(b, color, move) {
      const bucket = learnBook[learningKey(b, color)];
      if (!bucket) return 0;
      return bucket[moveKey(move)] || 0;
    }

    function isInCheck(b, color) {
      const king = findKing(b, color);
      if (!king) return true;
      return isSquareAttacked(b, king.r, king.c, opposite(color));
    }

    function isSquareAttacked(b, tr, tc, byColor, includeOwnTarget = false) {
      const target = b[tr][tc];
      if (target && target.color === byColor && !includeOwnTarget) return false;

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (r === tr && c === tc) continue;
          const p = b[r][c];
          if (p && p.color === byColor && attacksSquareFrom(b, r, c, tr, tc)) return true;
        }
      }

      return false;
    }

    function attacksSquareFrom(b, r, c, tr, tc) {
      const p = b[r][c];
      if (!p) return false;

      const dr = tr - r;
      const dc = tc - c;
      const adr = Math.abs(dr);
      const adc = Math.abs(dc);

      switch (p.type) {
        case "k":
          if (c === tc) {
            const step = tr > r ? 1 : -1;
            let nr = r + step;
            let clear = true;
            while (nr !== tr) {
              if (b[nr][c]) { clear = false; break; }
              nr += step;
            }
            if (clear && b[tr][tc] && b[tr][tc].type === "k" && b[tr][tc].color !== p.color) return true;
          }
          return adr + adc === 1 && inPalace(tr, tc, p.color);

        case "a":
          return adr === 1 && adc === 1 && inPalace(tr, tc, p.color);

        case "b":
          if (adr !== 2 || adc !== 2) return false;
          if (p.color === "red" && tr < 5) return false;
          if (p.color === "black" && tr > 4) return false;
          return !b[r + dr / 2][c + dc / 2];

        case "n":
          if (!((adr === 2 && adc === 1) || (adr === 1 && adc === 2))) return false;
          if (adr === 2) return !b[r + dr / 2][c];
          return !b[r][c + dc / 2];

        case "r":
          if (r !== tr && c !== tc) return false;
          return countBetween(b, r, c, tr, tc) === 0;

        case "c":
          if (r !== tr && c !== tc) return false;
          return countBetween(b, r, c, tr, tc) === 1;

        case "p":
          if (p.color === "red") {
            if (dr === -1 && dc === 0) return true;
            return hasCrossedRiver(p.color, r) && dr === 0 && adc === 1;
          } else {
            if (dr === 1 && dc === 0) return true;
            return hasCrossedRiver(p.color, r) && dr === 0 && adc === 1;
          }

        default:
          return false;
      }
    }

    function countBetween(b, r, c, tr, tc) {
      let count = 0;
      const dr = Math.sign(tr - r);
      const dc = Math.sign(tc - c);
      let nr = r + dr, nc = c + dc;

      while (nr !== tr || nc !== tc) {
        if (b[nr][nc]) count++;
        nr += dr;
        nc += dc;
      }

      return count;
    }

    function hasAnyLegalMove(b, color) {
      return generateAllLegalMoves(b, color).length > 0;
    }

    function findKing(b, color) {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = b[r][c];
          if (p && p.color === color && p.type === "k") return { r, c };
        }
      }
      return null;
    }

    function totalMaterial(b) {
      let sum = 0;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = b[r][c];
          if (p && p.type !== "k") sum += baseValue[p.type];
        }
      }
      return sum;
    }

    function hasMajorMaterial(b, color) {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = b[r][c];
          if (p && p.color === color && ["r", "c", "n"].includes(p.type)) return true;
        }
      }
      return false;
    }

    function applyMoveToClone(b, move) {
      const next = cloneBoard(b);
      next[move.to.r][move.to.c] = next[move.from.r][move.from.c];
      next[move.from.r][move.from.c] = null;
      return next;
    }

    function cloneBoard(b) {
      return b.map(row => row.map(p => p ? { ...p } : null));
    }

    function inBounds(r, c) {
      return r >= 0 && r < ROWS && c >= 0 && c < COLS;
    }

    function inPalace(r, c, color) {
      if (c < 3 || c > 5) return false;
      return color === "red" ? r >= 7 && r <= 9 : r >= 0 && r <= 2;
    }

    function hasCrossedRiver(color, r) {
      return color === "red" ? r <= 4 : r >= 5;
    }

    function opposite(color) {
      return color === "red" ? "black" : "red";
    }

    function sameMove(a, b) {
      return a && b && a.from.r === b.from.r && a.from.c === b.from.c && a.to.r === b.to.r && a.to.c === b.to.c;
    }

    function moveKey(m) {
      return `${m.from.r}${m.from.c}${m.to.r}${m.to.c}`;
    }

    function coordText(r, c) {
      return `${String.fromCharCode(65 + c)}${r + 1}`;
    }

    function hashBoard(b, side) {
      let s = side + ":";
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = b[r][c];
          s += p ? p.color[0] + p.type : ".";
        }
      }
      return s;
    }

    function learningKey(b, side) {
      // 简化局面 key：保存前中局常见结构，避免 localStorage 过大
      let s = side + "|";
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = b[r][c];
          if (!p) continue;
          if (["k", "r", "c", "n", "p"].includes(p.type)) {
            s += `${p.color[0]}${p.type}${r}${c}`;
          }
        }
      }
      return s;
    }

    function updateStatus() {
      const turnText = turn === "red" ? "红方" : "黑方";
      const turnClass = turn === "red" ? "red" : "black";
      const aiColor = getAiColor();
      const inCheck = !gameOver && isInCheck(board, turn);

      if (gameOver) {
        if (ruleWinner) {
          statusEl.innerHTML = `判负：${ruleReason}<br><span class="small"><span class="${ruleWinner}">${colorName(ruleWinner)}</span> 获胜。</span>`;
          return;
        }

        if (drawReason) {
          statusEl.innerHTML = `和棋：${drawReason}<br><span class="small">当前规则：长将、单方长捉判负；双方均未犯长打时，三次重复可判和。</span>`;
          return;
        }

        if (lastMove && lastMove.captured && lastMove.captured.type === "k") {
          const winner = lastMove.piece.color === "red" ? "红方" : "黑方";
          statusEl.innerHTML = `游戏结束：<span class="${lastMove.piece.color}">${winner}</span> 获胜。`;
          return;
        }

        const winner = opposite(turn);
        statusEl.innerHTML = `${isInCheck(board, turn) ? "将死" : "困毙"}！<span class="${winner}">${winner === "red" ? "红方" : "黑方"}</span> 获胜。`;
        return;
      }

      const modeText = modeEl.value === "ai-vs-ai"
        ? "　AI 自战"
        : aiColor ? `　AI 执${aiColor === "red" ? "红" : "黑"}` : "　双人对弈";

      const thinking = aiThinking ? `　🤖 AI 思考中...` : "";
      statusEl.innerHTML = `轮到：<span class="${turnClass}">${turnText}</span>${modeText}${inCheck ? "　⚠️ 正被将军" : ""}${thinking}<br><span class="small">搜索节点会在控制台显示；本地经验在浏览器，公共训练库来自仓库里的 training-data.json。</span>`;
    }

    function renderMoves() {
      if (!moveRecords.length) {
        movesEl.innerHTML = "<div>棋谱会显示在这里。</div>";
        return;
      }

      movesEl.innerHTML = moveRecords.map((x, i) => `<div>${i + 1}. ${x}</div>`).join("");
      movesEl.scrollTop = movesEl.scrollHeight;
    }

    function restartGame() {
      board = createInitialBoard();
      turn = "red";
      selected = null;
      legalTargets = [];
      gameOver = false;
      ruleWinner = null;
      ruleReason = null;
      drawReason = null;
      lastMove = null;
      history = [];
      moveRecords = [];
      positionHistory = [];
      aiThinking = false;
      resetDrawTrackers();
      render();
      scheduleAiMove();
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    restartBtn.addEventListener("click", restartGame);

    flipBtn.addEventListener("click", () => {
      flipped = !flipped;
      render();
    });

    undoBtn.addEventListener("click", () => {
      if (aiThinking || training) return;
      const steps = getAiColor() && modeEl.value !== "two-player" ? 2 : 1;

      for (let i = 0; i < steps && history.length; i++) {
        const state = history.pop();
        board = state.board;
        turn = state.turn;
        lastMove = state.lastMove;
        gameOver = state.gameOver;
        drawReason = state.drawReason || null;
        ruleWinner = state.ruleWinner || null;
        ruleReason = state.ruleReason || null;
        halfmoveClock = state.halfmoveClock || 0;
        boardStateCounts = state.boardStateCounts ? { ...state.boardStateCounts } : {};
        stateTimeline = state.stateTimeline ? [...state.stateTimeline] : [];
        ruleMoveHistory = state.ruleMoveHistory ? [...state.ruleMoveHistory] : [];
        checkingStreak = state.checkingStreak ? { ...state.checkingStreak } : { red: 0, black: 0 };
        moveRecords = [...state.records];
        positionHistory = [...state.pos];
      }

      selected = null;
      legalTargets = [];
      render();
    });

    modeEl.addEventListener("change", restartGame);

    difficultyEl.addEventListener("change", () => {
      selected = null;
      legalTargets = [];
      render();
      scheduleAiMove();
    });

    trainBtn.addEventListener("click", () => trainSelfPlay(20));
    trainDeepBtn.addEventListener("click", () => trainSelfPlay(100));

    exportLearnBtn.addEventListener("click", exportTrainingData);

    importJsonBtn.addEventListener("click", () => importJsonFileEl.click());

    importJsonFileEl.addEventListener("change", event => {
      importTrainingJsonFile(event.target.files[0]);
    });

    loadSiteLearnBtn.addEventListener("click", () => loadSiteTrainingData(true));

    importBtn.addEventListener("click", () => importFileEl.click());
    importFileEl.addEventListener("change", async () => {
      const file = importFileEl.files && importFileEl.files[0];
      if (!file) return;
      const text = await file.text();
      importTrainingText(text);
      importFileEl.value = "";
    });

    clearLearnBtn.addEventListener("click", () => {
      if (training) return;
      if (!confirm("确定要清空本地训练经验吗？")) return;
      learnBook = {};
      localStorage.removeItem(LEARN_KEY);
      localStorage.removeItem(SEED_KEY);
      updateTrainingInfo();
      render();
    });

    async function boot() {
      seedBuiltInMasterBook();
      await loadSiteTrainingData(false);
      resetDrawTrackers();
      render();
      scheduleAiMove();
    }

    boot();
  </script>
