<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中国象棋</title>
  <style>
    :root {
      --line: #5b2f12;
      --red: #c52222;
      --black: #151515;
      --hint: rgba(46, 160, 67, 0.35);
      --select: rgba(255, 214, 10, 0.78);
      --last: rgba(40, 112, 255, 0.24);
      --panel: rgba(255, 248, 232, 0.92);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow-y: scroll;
      background: radial-gradient(circle at top, #fff3d6, #d9a35a 70%);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      color: #29170a;
    }

    .app {
      width: min(98vw, 1040px);
      display: grid;
      grid-template-columns: minmax(320px, 660px) minmax(270px, 1fr);
      gap: 18px;
      align-items: start;
      justify-content: center;
      padding: 22px 18px 18px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(91, 47, 18, 0.22);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 18px 45px rgba(91, 47, 18, 0.22);
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0.04em;
    }

    .badge {
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(123, 63, 22, 0.12);
      color: #7b3f16;
      font-size: 12px;
      font-weight: 800;
    }

    .status {
      height: 62px;
      min-height: 62px;
      overflow: hidden;
      margin: 8px 0 14px;
      padding: 11px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.7);
      line-height: 1.45;
      font-weight: 700;
    }

    .red { color: var(--red); }
    .black { color: var(--black); }

    .buttons, .settings {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    .settings {
      grid-template-columns: 1fr 1fr;
    }

    .main-actions {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .advanced-actions {
      grid-template-columns: 1fr 1fr;
      margin-top: 10px;
    }

    button, select {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 10px 11px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 6px 14px rgba(91, 47, 18, 0.15);
    }

    button {
      cursor: pointer;
      color: #fff;
      background: #7b3f16;
    }

    button.secondary { background: #9b6a2d; }
    button.danger { background: #a73524; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    button:hover:not(:disabled) { filter: brightness(1.08); }

    select {
      background: #fff8e8;
      color: #29170a;
      border: 1px solid rgba(91, 47, 18, 0.22);
    }

    .label {
      display: grid;
      gap: 4px;
      font-size: 13px;
      font-weight: 700;
    }

    .advanced {
      margin: 6px 0 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.42);
      border: 1px solid rgba(91, 47, 18, 0.14);
      padding: 0 12px;
    }

    .advanced summary {
      cursor: pointer;
      padding: 11px 0;
      font-size: 14px;
      font-weight: 800;
      list-style-position: outside;
    }

    .meter {
      display: grid;
      gap: 6px;
      margin: 10px 0 12px;
      font-size: 13px;
      font-weight: 700;
    }

    .move-title {
      margin: 10px 0 6px;
      font-size: 13px;
      font-weight: 800;
      opacity: 0.82;
    }

    .meter-bar {
      height: 10px;
      background: rgba(91, 47, 18, 0.16);
      border-radius: 999px;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7b3f16, #d08a38);
      transition: width 0.15s linear;
    }

    .board-shell {
      position: relative;
      width: min(94vw, 650px);
      aspect-ratio: 9 / 10;
      margin: 0 auto;
      padding: 5.8%;
      background: linear-gradient(135deg, #eab65c, #ffd78d 45%, #d8953b);
      border: 5px solid #6f3b14;
      border-radius: 16px;
      box-shadow: inset 0 0 18px rgba(91, 47, 18, 0.32), 0 18px 45px rgba(91, 47, 18, 0.35);
      user-select: none;
    }

    .board {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .line {
      position: absolute;
      background: var(--line);
      opacity: 0.9;
    }

    .h-line { height: 2px; left: 0; right: 0; }
    .v-line { width: 2px; top: 0; bottom: 0; }
    .v-line.river-gap { bottom: auto; }
    .v-line.river-gap.bottom { top: auto; }

    .palace-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: visible;
    }

    .palace-line {
      stroke: var(--line);
      stroke-width: 2px;
      vector-effect: non-scaling-stroke;
      opacity: 0.9;
      stroke-linecap: square;
    }

    .river {
      position: absolute;
      left: 0;
      right: 0;
      top: 44.5%;
      height: 11%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      justify-items: center;
      font-size: clamp(22px, 5vw, 44px);
      font-family: "KaiTi", "STKaiti", serif;
      color: rgba(91, 47, 18, 0.72);
      pointer-events: none;
    }

    .river span {
      letter-spacing: 0.32em;
      white-space: nowrap;
      transform: translateX(0.16em);
    }

    .cell {
      position: absolute;
      z-index: 2;
      width: 9.8%;
      aspect-ratio: 1;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .cell.hint::after {
      content: "";
      width: 42%;
      height: 42%;
      border-radius: 50%;
      background: var(--hint);
      border: 1px solid rgba(12, 90, 25, 0.6);
    }

    .cell.capture::after {
      content: "";
      width: 80%;
      height: 80%;
      border-radius: 50%;
      border: 4px solid rgba(46, 160, 67, 0.65);
    }

    .cell.last { background: var(--last); }

    .piece {
      position: absolute;
      width: 9.6%;
      aspect-ratio: 1;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      z-index: 3;
      font-family: "KaiTi", "STKaiti", serif;
      font-weight: 900;
      font-size: clamp(20px, 4.6vw, 38px);
      background: radial-gradient(circle at 35% 28%, #fff8df, #f3d08b 58%, #b87028);
      border: 3px solid #7b3f16;
      box-shadow: inset 0 0 5px rgba(255,255,255,0.75), 0 5px 10px rgba(55, 22, 5, 0.36);
      cursor: pointer;
      transition: transform 0.08s ease, filter 0.08s ease;
    }

    .piece.red { color: var(--red); }
    .piece.black { color: var(--black); }
    .piece.selected {
      outline: 5px solid var(--select);
      transform: translate(-50%, -50%) scale(1.08);
      filter: brightness(1.08);
    }

    .move-list {
      margin-top: 0;
      height: 190px;
      max-height: 190px;
      overflow: auto;
      padding-right: 6px;
      font-size: 13px;
      line-height: 1.7;
      background: rgba(255,255,255,0.45);
      border-radius: 12px;
    }

    .move-list div {
      padding: 4px 8px;
      border-bottom: 1px dashed rgba(91, 47, 18, 0.22);
    }

    .round-row {
      display: grid;
      grid-template-columns: 34px 1fr 1fr;
      align-items: center;
      gap: 8px;
      min-height: 30px;
    }

    .round-no {
      opacity: 0.65;
      font-weight: 800;
    }

    .round-move {
      font-family: "KaiTi", "STKaiti", "Microsoft YaHei", serif;
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
    }

    .red-move { color: var(--red); }
    .black-move { color: var(--black); }

    .small {
      font-size: 12px;
      opacity: 0.82;
      line-height: 1.6;
    }

    @media (max-width: 810px) {
      .app { grid-template-columns: 1fr; }
      .panel { order: 2; }
    }

    @media (max-width: 420px) {
      .settings, .main-actions, .advanced-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="board-shell" aria-label="中国象棋棋盘">
      <div id="board" class="board"></div>
    </section>

    <aside class="panel">
      <div class="title-row">
        <h1>中国象棋</h1>
        <span class="badge">AI</span>
      </div>

      <div id="status" class="status"></div>

      <div class="settings">
        <label class="label">模式
          <select id="mode">
            <option value="human-red">我执红</option>
            <option value="human-black">我执黑</option>
            <option value="two-player">双人</option>
            <option value="ai-vs-ai">AI 自战</option>
          </select>
        </label>

        <label class="label">难度
          <select id="difficulty">
            <option value="1">简单</option>
            <option value="2">普通</option>
            <option value="3" selected>困难</option>
            <option value="4">大师</option>
          </select>
        </label>
      </div>

      <div class="buttons main-actions">
        <button id="restart">重新开始</button>
        <button id="flip" class="secondary">翻转</button>
        <button id="undo" class="secondary">悔棋</button>
      </div>

      <details class="advanced">
        <summary>训练与数据</summary>

        <div class="buttons advanced-actions">
          <button id="train">训练 20 局</button>
          <button id="trainDeep" class="secondary">训练 100 局</button>
          <button id="stopTrain" class="danger" disabled>停止训练</button>
          <button id="importBtn" class="secondary">导入棋谱</button>
          <input id="importFile" type="file" accept=".txt,.csv,.json" style="display:none" />
          <button id="exportLearn" class="secondary">导出数据</button>
          <button id="importJsonBtn" class="secondary">导入数据</button>
          <button id="loadSiteLearn" class="secondary">加载网站库</button>
          <button id="clearLearn" class="danger">清空</button>
          <input id="importJsonFile" type="file" accept=".json,application/json" style="display:none" />
        </div>

        <div class="meter">
          <div id="trainText">训练经验：0</div>
          <div class="meter-bar"><div id="trainFill" class="meter-fill"></div></div>
        </div>
      </details>

      <div class="move-title">棋谱</div>
      <div id="moves" class="move-list"></div>
    </aside>
  </main>

  <script>
    const ROWS = 10;
    const COLS = 9;
    const INF = 1e12;
    const MATE = 100000000;
    const LEARN_KEY = "xiangqi_ai_pro_learning_v3";
    const SEED_KEY = "xiangqi_ai_pro_seeded_master_book_v6";
    const SITE_TRAINING_URL = "training-data.json";
    const MODEL_KEY = "xiangqi_ai_policy_value_model_v1";

    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const movesEl = document.getElementById("moves");
    const restartBtn = document.getElementById("restart");
    const flipBtn = document.getElementById("flip");
    const undoBtn = document.getElementById("undo");
    const trainBtn = document.getElementById("train");
    const trainDeepBtn = document.getElementById("trainDeep");
    const stopTrainBtn = document.getElementById("stopTrain");
    const importBtn = document.getElementById("importBtn");
    const importFileEl = document.getElementById("importFile");
    const clearLearnBtn = document.getElementById("clearLearn");
    const exportLearnBtn = document.getElementById("exportLearn");
    const importJsonBtn = document.getElementById("importJsonBtn");
    const importJsonFileEl = document.getElementById("importJsonFile");
    const loadSiteLearnBtn = document.getElementById("loadSiteLearn");
    const modeEl = document.getElementById("mode");
    const difficultyEl = document.getElementById("difficulty");
    const trainTextEl = document.getElementById("trainText");
    const trainFillEl = document.getElementById("trainFill");

    const pieceText = {
      red: { k: "帥", a: "仕", b: "相", n: "馬", r: "車", c: "炮", p: "兵" },
      black: { k: "將", a: "士", b: "象", n: "馬", r: "車", c: "炮", p: "卒" }
    };

    const pieceName = { k: "将", a: "士", b: "象", n: "马", r: "车", c: "炮", p: "兵" };

    const baseValue = {
      k: 200000,
      r: 1000,
      c: 520,
      n: 480,
      b: 250,
      a: 250,
      p: 120
    };

    const mobilityWeight = {
      k: 0,
      r: 5,
      c: 4,
      n: 6,
      b: 1,
      a: 1,
      p: 3
    };

    const AI_LEVELS = {
      1: { depth: 3, timeMs: 420, maxQuiet: 14, randomNoise: 16, mctsMs: 0, mctsSims: 0, rootLimit: 10 },
      2: { depth: 4, timeMs: 850, maxQuiet: 20, randomNoise: 2, mctsMs: 0, mctsSims: 0, rootLimit: 12 },
      3: { depth: 5, timeMs: 1500, maxQuiet: 28, randomNoise: 0, mctsMs: 0, mctsSims: 0, rootLimit: 16 },
      4: { depth: 6, timeMs: 2600, maxQuiet: 36, randomNoise: 0, mctsMs: 220, mctsSims: 12, rootLimit: 20 }
    };

    let board = createInitialBoard();
    let turn = "red";
    let selected = null;
    let legalTargets = [];
    let flipped = false;
    let gameOver = false;
    let drawReason = null;
    let ruleWinner = null;
    let ruleReason = null;
    let halfmoveClock = 0;
    let boardStateCounts = {};
    let stateTimeline = [];
    let ruleMoveHistory = [];
    let checkingStreak = { red: 0, black: 0 };
    let lastMove = null;
    let history = [];
    let moveRecords = [];
    let positionHistory = [];
    let aiThinking = false;
    let training = false;
    let trainingAbort = false;

    let learnBook = loadLearnBook();
    let aiModel = loadAiModel();
    let tt = new Map();
    let killerMoves = Array.from({ length: 96 }, () => []);
    let historyHeuristic = new Map();
    let searchDeadline = 0;
    let searchStopped = false;
    let nodes = 0;
    let currentPvMove = null;

    function createInitialBoard() {
      const b = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
      const put = (r, c, color, type) => b[r][c] = { color, type };

      ["r", "n", "b", "a", "k", "a", "b", "n", "r"].forEach((type, c) => put(0, c, "black", type));
      put(2, 1, "black", "c"); put(2, 7, "black", "c");
      [0, 2, 4, 6, 8].forEach(c => put(3, c, "black", "p"));

      [0, 2, 4, 6, 8].forEach(c => put(6, c, "red", "p"));
      put(7, 1, "red", "c"); put(7, 7, "red", "c");
      ["r", "n", "b", "a", "k", "a", "b", "n", "r"].forEach((type, c) => put(9, c, "red", type));

      return b;
    }

    function render() {
      boardEl.innerHTML = "";
      drawBoardLines();
      drawRiverText();
      drawCells();
      drawPieces();
      updateStatus();
      renderMoves();
      updateTrainingInfo();
    }

    function drawBoardLines() {
      for (let r = 0; r < ROWS; r++) {
        const line = document.createElement("div");
        line.className = "line h-line";
        line.style.top = `${rowY(r)}%`;
        boardEl.appendChild(line);
      }

      for (let c = 0; c < COLS; c++) {
        if (c === 0 || c === COLS - 1) {
          const line = document.createElement("div");
          line.className = "line v-line";
          line.style.left = `${colX(c)}%`;
          boardEl.appendChild(line);
        } else {
          const top = document.createElement("div");
          top.className = "line v-line river-gap";
          top.style.left = `${colX(c)}%`;
          top.style.top = `${rowY(0)}%`;
          top.style.height = `${rowY(4) - rowY(0)}%`;
          boardEl.appendChild(top);

          const bottom = document.createElement("div");
          bottom.className = "line v-line river-gap bottom";
          bottom.style.left = `${colX(c)}%`;
          bottom.style.top = `${rowY(5)}%`;
          bottom.style.height = `${rowY(9) - rowY(5)}%`;
          boardEl.appendChild(bottom);
        }
      }

      drawPalace(0);
      drawPalace(7);
    }

    function drawPalace(startRow) {
      drawDiag(startRow, 3, startRow + 2, 5);
      drawDiag(startRow, 5, startRow + 2, 3);
    }

    function drawDiag(r1, c1, r2, c2) {
      const svgNS = "http://www.w3.org/2000/svg";

      let svg = boardEl.querySelector(".palace-svg");
      if (!svg) {
        svg = document.createElementNS(svgNS, "svg");
        svg.classList.add("palace-svg");
        svg.setAttribute("viewBox", "0 0 100 100");
        svg.setAttribute("preserveAspectRatio", "none");
        boardEl.appendChild(svg);
      }

      const line = document.createElementNS(svgNS, "line");
      line.classList.add("palace-line");
      line.setAttribute("x1", colX(c1));
      line.setAttribute("y1", rowY(r1));
      line.setAttribute("x2", colX(c2));
      line.setAttribute("y2", rowY(r2));
      svg.appendChild(line);
    }

    function drawRiverText() {
      const river = document.createElement("div");
      river.className = "river";

      const left = document.createElement("span");
      const right = document.createElement("span");

      // 翻转棋盘时只交换左右文字，不把单字倒序，避免出现“界楚 / 河漢”的问题。
      left.textContent = flipped ? "漢 界" : "楚 河";
      right.textContent = flipped ? "楚 河" : "漢 界";

      river.appendChild(left);
      river.appendChild(right);
      boardEl.appendChild(river);
    }

    function drawCells() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const { vr, vc } = toView(r, c);
          const cell = document.createElement("div");
          cell.className = "cell";
          cell.style.left = `${colX(vc)}%`;
          cell.style.top = `${rowY(vr)}%`;

          if (lastMove && ((lastMove.from.r === r && lastMove.from.c === c) || (lastMove.to.r === r && lastMove.to.c === c))) {
            cell.classList.add("last");
          }

          if (legalTargets.some(m => m.r === r && m.c === c)) {
            cell.classList.add(board[r][c] ? "capture" : "hint");
          }

          cell.addEventListener("click", () => onSquareClick(r, c));
          boardEl.appendChild(cell);
        }
      }
    }

    function drawPieces() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = board[r][c];
          if (!p) continue;
          const { vr, vc } = toView(r, c);
          const piece = document.createElement("div");
          piece.className = `piece ${p.color}`;
          piece.textContent = pieceText[p.color][p.type];
          piece.style.left = `${colX(vc)}%`;
          piece.style.top = `${rowY(vr)}%`;
          if (selected && selected.r === r && selected.c === c) piece.classList.add("selected");
          piece.addEventListener("click", event => {
            event.stopPropagation();
            onSquareClick(r, c);
          });
          boardEl.appendChild(piece);
        }
      }
    }

    function rowY(r) { return r * 100 / (ROWS - 1); }
    function colX(c) { return c * 100 / (COLS - 1); }
    function toView(r, c) { return flipped ? { vr: ROWS - 1 - r, vc: COLS - 1 - c } : { vr: r, vc: c }; }

    function getAiColor() {
      if (modeEl.value === "two-player") return null;
      if (modeEl.value === "ai-vs-ai") return turn;
      return modeEl.value === "human-red" ? "black" : "red";
    }

    function isAiTurn() {
      if (modeEl.value === "ai-vs-ai") return !gameOver;
      return getAiColor() === turn && !gameOver;
    }

    function onSquareClick(r, c) {
      if (gameOver || aiThinking || training || isAiTurn()) return;
      const piece = board[r][c];

      if (selected && legalTargets.some(m => m.r === r && m.c === c)) {
        makeRealMove({ from: selected, to: { r, c } });
        return;
      }

      if (piece && piece.color === turn) {
        selected = { r, c };
        legalTargets = getLegalMoves(board, r, c);
      } else {
        selected = null;
        legalTargets = [];
      }
      render();
    }

    function makeRealMove(move) {
      const fr = move.from.r, fc = move.from.c;
      const tr = move.to.r, tc = move.to.c;
      const piece = board[fr][fc];
      const captured = board[tr][tc];
      const beforeRuleKey = repetitionKey(board, turn);
      if (!piece) return;

      const chineseRecordText = formatChineseMove(board, fr, fc, tr, tc, captured);

      history.push({
        board: cloneBoard(board),
        turn,
        lastMove,
        gameOver,
        drawReason,
        ruleWinner,
        ruleReason,
        halfmoveClock,
        boardStateCounts: { ...boardStateCounts },
        stateTimeline: [...stateTimeline],
        ruleMoveHistory: [...ruleMoveHistory],
        checkingStreak: { ...checkingStreak },
        records: [...moveRecords],
        pos: [...positionHistory]
      });
      positionHistory.push({ key: learningKey(board, turn), move: moveKey(move), color: piece.color, features: extractModelFeatures(board, piece.color) });

      board[tr][tc] = piece;
      board[fr][fc] = null;
      lastMove = { from: { r: fr, c: fc }, to: { r: tr, c: tc }, piece, captured };
      selected = null;
      legalTargets = [];

      moveRecords.push(chineseRecordText);

      const progressMove = isProgressMove(piece, fr, fc, tr, tc, captured);

      if (captured && captured.type === "k") {
        gameOver = true;
        learnFromResult(piece.color);
        render();
        return;
      }

      halfmoveClock = progressMove ? 0 : halfmoveClock + 1;
      turn = opposite(turn);

      const gaveCheck = isInCheck(board, turn);
      const chaseTargets = getChaseTargetsAfterMove(board, tr, tc, piece.color);
      const afterRuleKey = repetitionKey(board, turn);
      ruleMoveHistory.push({
        beforeKey: beforeRuleKey,
        afterKey: afterRuleKey,
        mover: piece.color,
        move: moveKey(move),
        pieceType: piece.type,
        gaveCheck,
        chaseTargets
      });
      stateTimeline.push({ key: afterRuleKey, moveIndex: ruleMoveHistory.length });

      updateCheckingStreak(piece.color, gaveCheck);

      if (!hasAnyLegalMove(board, turn)) {
        gameOver = true;
        const winner = opposite(turn);
        learnFromResult(winner);
      }

      if (!gameOver) checkDrawAfterMove();

      render();
      scheduleAiMove();
    }


    function isProgressMove(piece, fr, fc, tr, tc, captured) {
      // 吃子或兵/卒推进算“有进展”。无进展规则只用于防止无意义拖局。
      return Boolean(captured) || piece.type === "p";
    }

    function repetitionKey(b, sideToMove) {
      return hashBoard(b, sideToMove);
    }

    function resetDrawTrackers() {
      drawReason = null;
      ruleWinner = null;
      ruleReason = null;
      halfmoveClock = 0;
      checkingStreak = { red: 0, black: 0 };
      boardStateCounts = {};
      ruleMoveHistory = [];
      stateTimeline = [];
      const key = repetitionKey(board, turn);
      boardStateCounts[key] = 1;
      stateTimeline.push({ key, moveIndex: 0 });
    }

    function updateCheckingStreak(moverColor, gaveCheck) {
      if (gaveCheck) {
        checkingStreak[moverColor] = (checkingStreak[moverColor] || 0) + 1;
      } else {
        checkingStreak[moverColor] = 0;
      }
      checkingStreak[opposite(moverColor)] = 0;
    }

    function getChaseTargetsAfterMove(b, r, c, moverColor) {
      const p = b[r][c];
      if (!p) return [];

      const targets = [];
      const attacks = getPseudoMoves(b, r, c);

      for (const m of attacks) {
        const target = b[m.r][m.c];
        if (!target || target.color === moverColor || target.type === "k") continue;

        // 用户要求按真实长打思路：长捉属于禁止着法。这里不再像上一版那样判和。
        // 为避免把无意义威胁算成捉，只记录被当前走子直接攻击的敌方非将帅子。
        targets.push({
          label: `${target.color}:${target.type}`,
          exact: `${target.color}:${target.type}:${m.r}:${m.c}`,
          type: target.type,
          color: target.color,
          value: baseValue[target.type] || 0
        });
      }

      return targets;
    }

    function checkDrawAfterMove() {
      const key = repetitionKey(board, turn);
      boardStateCounts[key] = (boardStateCounts[key] || 0) + 1;

      if (boardStateCounts[key] >= 3) {
        const verdict = analyzeRepetitionRule(key);

        if (verdict && verdict.loser) {
          ruleWinner = opposite(verdict.loser);
          ruleReason = `${colorName(verdict.loser)}${verdict.reason}，按长打规则判负`;
          gameOver = true;
          learnFromResult(ruleWinner);
          return true;
        }

        drawReason = "三次重复局面，双方均未构成单方长将或长捉";
        gameOver = true;
        return true;
      }

      if (halfmoveClock >= 120) {
        drawReason = "连续 60 回合无吃子且无兵卒推进";
        gameOver = true;
        return true;
      }

      if (checkingStreak.red >= 6) {
        ruleWinner = "black";
        ruleReason = "红方连续长将，按长打规则判负";
        gameOver = true;
        learnFromResult(ruleWinner);
        return true;
      }

      if (checkingStreak.black >= 6) {
        ruleWinner = "red";
        ruleReason = "黑方连续长将，按长打规则判负";
        gameOver = true;
        learnFromResult(ruleWinner);
        return true;
      }

      return false;
    }

    function analyzeRepetitionRule(repeatedKey) {
      const occurrences = stateTimeline
        .map((item, index) => ({ ...item, timelineIndex: index }))
        .filter(item => item.key === repeatedKey);

      if (occurrences.length < 3) return null;

      // 用最近一次循环判断。当前局面第三次出现时，上一段循环就是“不变作”的核心循环。
      const prev = occurrences[occurrences.length - 2];
      const curr = occurrences[occurrences.length - 1];
      const loopMoves = ruleMoveHistory.slice(prev.moveIndex, curr.moveIndex);
      if (!loopMoves.length) return null;

      const redKind = classifyForbiddenLoop(loopMoves, "red");
      const blackKind = classifyForbiddenLoop(loopMoves, "black");

      if (redKind && !blackKind) return { loser: "red", reason: redKind };
      if (blackKind && !redKind) return { loser: "black", reason: blackKind };

      // 双方都在长打时，各地竞赛细则处理很复杂。这里为了避免误判单方负，按重复和棋处理。
      return null;
    }

    function classifyForbiddenLoop(loopMoves, color) {
      const ownMoves = loopMoves.filter(m => m.mover === color);
      if (!ownMoves.length) return null;

      if (ownMoves.every(m => m.gaveCheck)) {
        return "长将";
      }

      if (isLongChase(ownMoves)) {
        return "长捉";
      }

      return null;
    }

    function isLongChase(ownMoves) {
      // 长捉：循环中同一方每次都在直接追捉对方棋子。
      // 完整中国棋规会细分真根、假根、分捉、兑、献等复杂棋例；
      // 这里实现网页 AI 版的实用判定：若循环内该方每手都直接攻击同类敌子，则判长捉。
      const chaseMoves = ownMoves.filter(m => m.chaseTargets && m.chaseTargets.length > 0);
      if (chaseMoves.length !== ownMoves.length) return false;

      let common = new Set(chaseMoves[0].chaseTargets.map(t => t.label));
      for (let i = 1; i < chaseMoves.length; i++) {
        const labels = new Set(chaseMoves[i].chaseTargets.map(t => t.label));
        common = new Set([...common].filter(x => labels.has(x)));
        if (common.size === 0) return false;
      }

      return common.size > 0;
    }

    function wouldLoseByLongRuleAfterMove(b, move, color) {
      // 只在真实棋局根节点使用：AI 如果优势明显，不应主动走入长将/长捉判负。
      const next = applyMoveToClone(b, move);
      const nextSide = opposite(color);
      const afterKey = repetitionKey(next, nextSide);
      const existingCount = boardStateCounts[afterKey] || 0;
      if (existingCount < 2) return false;

      const movedPiece = next[move.to.r][move.to.c];
      if (!movedPiece) return false;

      const simulatedTimeline = [...stateTimeline, { key: afterKey, moveIndex: ruleMoveHistory.length + 1 }];
      const simulatedMoves = [...ruleMoveHistory, {
        beforeKey: repetitionKey(b, color),
        afterKey,
        mover: color,
        move: moveKey(move),
        pieceType: movedPiece.type,
        gaveCheck: isInCheck(next, nextSide),
        chaseTargets: getChaseTargetsAfterMove(next, move.to.r, move.to.c, color)
      }];

      const occurrences = simulatedTimeline
        .map((item, index) => ({ ...item, timelineIndex: index }))
        .filter(item => item.key === afterKey);
      if (occurrences.length < 3) return false;

      const prev = occurrences[occurrences.length - 2];
      const curr = occurrences[occurrences.length - 1];
      const loopMoves = simulatedMoves.slice(prev.moveIndex, curr.moveIndex);
      const kind = classifyForbiddenLoop(loopMoves, color);
      return Boolean(kind);
    }

    function colorName(color) {
      return color === "red" ? "红方" : "黑方";
    }

    function scheduleAiMove() {
      if (!isAiTurn()) return;

      // AI 自战是演示/训练观察模式，不能每步都跑大师级深搜，
      // 否则浏览器主线程会被长时间占用，系统会提示“页面没有响应”。
      if (modeEl.value === "ai-vs-ai" && moveRecords.length >= 260) {
        drawReason = "AI 自战达到步数上限";
        gameOver = true;
        render();
        return;
      }

      aiThinking = true;
      selected = null;
      legalTargets = [];
      render();

      setTimeout(() => {
        const aiColor = turn;
        const difficulty = Number(difficultyEl.value);
        const move = modeEl.value === "ai-vs-ai"
          ? chooseAiVsAiMove(board, aiColor)
          : chooseAiMove(board, aiColor, difficulty);

        aiThinking = false;
        if (move) makeRealMove(move);
        else render();
      }, modeEl.value === "ai-vs-ai" ? 220 : 260);
    }


    function chooseAiVsAiMove(b, color) {
      let moves = generateAllLegalMoves(b, color);
      if (!moves.length) return null;

      // 自战模式使用快速策略评估，不跑深层搜索，保证页面流畅。
      // 仍保留防送子、吃子、将军、模型先验和局面评估。
      const winNow = findImmediateWinMove(b, color, moves);
      if (winNow) return winNow;

      const urgentCapture = findUrgentCaptureMove(b, color, moves);
      if (urgentCapture) return urgentCapture;

      const safeMoves = moves.filter(m => !isFastObviousBlunder(b, m, color));
      if (safeMoves.length) moves = safeMoves;

      moves = filterSevereBlunders(b, moves, color);

      const notAllowMate = moves.filter(m => !allowsImmediateWin(b, m, color));
      if (notAllowMate.length) moves = notAllowMate;

      const immediate = findFastImmediateMove(b, color, moves);
      if (immediate) return immediate;

      const book = moveRecords.length < 8 ? chooseOpeningBookMove(b, color, moves) : null;
      if (book && !isFastObviousBlunder(b, book, color) && Math.random() < 0.55) return book;

      let best = moves[0];
      let bestScore = -INF;
      const candidates = moves
        .map(move => ({ move, score: fastMoveScore(b, move, color) }))
        .sort((a, z) => z.score - a.score)
        .slice(0, 16);

      for (const item of candidates) {
        const move = item.move;
        const next = applyMoveToClone(b, move);
        let score = item.score;

        // 只对前 16 个候选做一次轻量局面评估，远轻于大师级搜索。
        score += evaluateRelative(next, color) * 0.45;

        // 防止自战陷入完全确定的重复路线，保留一点探索。
        score += Math.random() * 35;

        if (score > bestScore) {
          bestScore = score;
          best = move;
        }
      }

      return best;
    }

    function findFastImmediateMove(b, color, moves) {
      const enemy = opposite(color);

      for (const move of moves) {
        const captured = b[move.to.r][move.to.c];
        if (captured && captured.type === "k") return move;

        const next = applyMoveToClone(b, move);
        if (isInCheck(next, enemy)) {
          const replies = generateAllLegalMoves(next, enemy);
          if (replies.length <= 1) return move;
        }
      }

      let best = null;
      let bestGain = 0;
      for (const move of moves) {
        const captured = b[move.to.r][move.to.c];
        if (!captured) continue;
        const gain = captureStaticGain(b, move, color);
        if (gain > bestGain) {
          bestGain = gain;
          best = move;
        }
      }

      return bestGain >= 480 ? best : null;
    }

    function fastMoveScore(b, move, color) {
      const p = b[move.from.r][move.from.c];
      const target = b[move.to.r][move.to.c];
      if (!p) return -INF;

      const next = applyMoveToClone(b, move);
      const enemy = opposite(color);
      let score = 0;

      if (target) score += captureStaticGain(b, move, color) * 1.25;
      if (isInCheck(next, enemy)) score += 380;
      if (createsBigThreat(next, move.to.r, move.to.c, color)) score += 220;
      if (findImmediateWinMove(b, color, [move])) score += MATE / 20;
      if (findImmediateWinMove(next, enemy)) score -= MATE / 18;

      score += modelPolicyPrior(b, move, color) * 260;
      score += getLearnScoreForMove(b, color, move) * 110;

      const before = positionalBonus(b, p, move.from.r, move.from.c, gamePhase(b));
      const after = positionalBonus(next, p, move.to.r, move.to.c, gamePhase(next));
      score += (after - before) * 4;

      score -= landingSquareRisk(next, move.to.r, move.to.c, color) * 2.2;
      score -= exposedMajorPieceRisk(b, next, color) * 0.9;
      score -= (moveRecords.length < 40 ? severeBlunderScore(b, move, color) : 0) * 1.2;
      score += masterStyleMoveBonus(b, move, color) * 140;
      score += masterDefenseBonus(b, move, color) * 1.4;

      if (moveRecords.length < 12) {
        if (p.type === "r" && !target) score -= 180;
        if (p.type === "n" || p.type === "c") score += 55;
        if (p.type === "p" && hasCrossedRiver(color, move.to.r)) score += 40;
      }

      return score;
    }

    function isFastObviousBlunder(b, move, color) {
      const p = b[move.from.r][move.from.c];
      const target = b[move.to.r][move.to.c];
      if (!p) return true;

      const next = applyMoveToClone(b, move);
      const enemy = opposite(color);

      if (target && target.type === "k") return false;
      if (isInCheck(next, enemy)) return false;
      if (findImmediateWinMove(next, enemy)) return true;

      const risk = landingSquareRisk(next, move.to.r, move.to.c, color);
      const exposed = exposedMajorPieceRisk(b, next, color);
      const gain = target ? baseValue[target.type] || 0 : 0;

      if (risk >= 360 && gain < risk * 0.75) return true;
      if (exposed >= 520 && gain < exposed * 0.65) return true;

      return false;
    }


    function chooseAlphaZeroStyleMove(b, color, moves, profile) {
      const budgetMs = profile.mctsMs || 0;
      const maxSims = profile.mctsSims || 0;
      if (!budgetMs || !maxSims || moves.length < 2) return null;

      const rootKey = learningKey(b, color);
      const deadline = performance.now() + budgetMs;
      const children = buildMctsRootChildren(b, color, moves);
      if (!children.length) return null;

      let totalVisits = children.reduce((sum, child) => sum + child.n, 0) || 1;
      let sims = 0;

      while (sims < maxSims && performance.now() < deadline) {
        const selected = selectMctsChild(children, totalVisits);
        const next = selected.board || (selected.board = applyMoveToClone(b, selected.move));
        const value = alphaRolloutValue(next, opposite(color), color, profile.depth >= 8 ? 3 : 2);
        selected.n += 1;
        selected.w += value;
        selected.q = selected.w / selected.n;
        totalVisits += 1;
        sims += 1;
      }

      children.sort((a, z) => {
        if (z.n !== a.n) return z.n - a.n;
        return z.q - a.q;
      });

      if (totalVisits >= 12) distillMctsPolicy(rootKey, children, totalVisits);

      const best = children[0];
      if (!best) return null;

      // 避免 MCTS 因模型先验误选危险招。
      if (isObviousBlunder(b, best.move, color) || allowsImmediateWin(b, best.move, color)) {
        const fallback = children.find(ch => !isObviousBlunder(b, ch.move, color) && !allowsImmediateWin(b, ch.move, color));
        return fallback ? fallback.move : null;
      }

      return best.move;
    }

    function buildMctsRootChildren(b, color, moves) {
      const raw = [];
      let maxPrior = -INF;

      for (const move of moves) {
        if (allowsImmediateWin(b, move, color)) continue;
        const priorScore = alphaPolicyPriorScore(b, move, color);
        if (!Number.isFinite(priorScore)) continue;
        maxPrior = Math.max(maxPrior, priorScore);
        raw.push({ move, priorScore });
      }

      if (!raw.length) return [];

      let sum = 0;
      const children = raw.map(item => {
        const p = Math.exp(Math.max(-6, Math.min(6, item.priorScore - maxPrior)));
        sum += p;
        return {
          move: item.move,
          p,
          n: 1,
          w: 0,
          q: 0,
          board: null
        };
      });

      for (const child of children) {
        child.p = child.p / sum;
        // 先用价值网络给一个虚拟访问，类似 AlphaZero 的 value prior。
        const next = applyMoveToClone(b, child.move);
        const v = alphaLeafValue(next, opposite(color), color);
        child.w = v;
        child.q = v;
        child.board = next;
      }

      return children;
    }

    function selectMctsChild(children, totalVisits) {
      const cPuct = 1.35;
      const sqrtTotal = Math.sqrt(Math.max(1, totalVisits));
      let best = children[0];
      let bestScore = -INF;

      for (const child of children) {
        const u = cPuct * child.p * sqrtTotal / (1 + child.n);
        const score = child.q + u;
        if (score > bestScore) {
          bestScore = score;
          best = child;
        }
      }

      return best;
    }

    function alphaPolicyPriorScore(b, move, color) {
      const p = b[move.from.r][move.from.c];
      const target = b[move.to.r][move.to.c];
      if (!p) return -INF;

      const next = applyMoveToClone(b, move);
      const enemy = opposite(color);
      let score = 0;

      // 这部分相当于 policy network 的手工特征先验。
      score += modelPolicyPrior(b, move, color) * 2.4;
      score += masterStyleMoveBonus(b, move, color) * 1.4;
      score += clampFeature(masterDefenseBonus(b, move, color) / 900) * 1.2;
      score += getLearnScoreForMove(b, color, move) / 7;

      if (target) score += Math.max(-1.2, Math.min(1.6, captureStaticGain(b, move, color) / 700));
      if (isInCheck(next, enemy)) score += 0.9;
      if (createsBigThreat(next, move.to.r, move.to.c, color)) score += 0.55;

      const risk = landingSquareRisk(next, move.to.r, move.to.c, color);
      score -= Math.min(2.5, risk / 520);

      const exposed = exposedMajorPieceRisk(b, next, color);
      score -= Math.min(2.2, exposed / 650);

      if (p.type === "r" && moveRecords.length < 10 && !target) score -= 0.55;
      if ((p.type === "n" || p.type === "c") && moveRecords.length < 10) score += 0.25;

      return score;
    }

    function alphaRolloutValue(b, sideToMove, rootColor, depth) {
      const legal = generateAllLegalMoves(b, sideToMove);
      if (!legal.length) return sideToMove === rootColor ? -1 : 1;

      const win = findImmediateWinMove(b, sideToMove, legal);
      if (win) return sideToMove === rootColor ? 1 : -1;

      if (depth <= 0) return alphaLeafValue(b, sideToMove, rootColor);

      const candidates = legal
        .map(move => ({ move, score: alphaPolicyPriorScore(b, move, sideToMove) }))
        .sort((a, z) => z.score - a.score)
        .slice(0, sideToMove === rootColor ? 5 : 6);

      if (sideToMove === rootColor) {
        let best = -1;
        for (const item of candidates) {
          const next = applyMoveToClone(b, item.move);
          best = Math.max(best, alphaRolloutValue(next, opposite(sideToMove), rootColor, depth - 1));
        }
        return best;
      } else {
        let worst = 1;
        for (const item of candidates) {
          const next = applyMoveToClone(b, item.move);
          worst = Math.min(worst, alphaRolloutValue(next, opposite(sideToMove), rootColor, depth - 1));
        }
        return worst;
      }
    }

    function alphaLeafValue(b, sideToMove, rootColor) {
      // value network：把传统评估和可学习模型合成 [-1,1]。
      const staticEval = evaluateRelative(b, rootColor) / 2300;
      const modelEval = predictFromFeatures(extractModelFeatures(b, rootColor)) * 0.85;
      const threat = strongestTacticalThreat(b, rootColor).score - strongestTacticalThreat(b, opposite(rootColor)).score;
      const threatEval = Math.max(-1, Math.min(1, threat / 1800)) * 0.45;
      return Math.max(-1, Math.min(1, Math.tanh(staticEval + modelEval + threatEval)));
    }

    function distillMctsPolicy(rootKey, children, totalVisits) {
      // 模拟 AlphaZero 的“搜索结果反哺策略网络”：把 MCTS 访问多的走法轻微写入经验表。
      if (!rootKey || !children.length || totalVisits < 12) return;
      if (!learnBook[rootKey]) learnBook[rootKey] = {};

      const top = children.slice(0, 4);
      for (const child of top) {
        const prob = child.n / totalVisits;
        if (prob <= 0.03) continue;
        const key = moveKey(child.move);
        learnBook[rootKey][key] = (learnBook[rootKey][key] || 0) + prob * 0.35;
        learnBook[rootKey][key] = Math.max(-40, Math.min(40, learnBook[rootKey][key]));
      }
    }


    function filterFastRootBlunders(b, moves, color) {
      if (!moves || moves.length <= 1) return moves;

      const safe = [];
      for (const move of moves) {
        const p = b[move.from.r][move.from.c];
        const target = b[move.to.r][move.to.c];
        if (!p) continue;

        const next = applyMoveToClone(b, move);
        const enemy = opposite(color);

        // 立即胜着保留
        if (target && target.type === "k") {
          safe.push(move);
          continue;
        }

        // 走完让对方一步杀，剔除
        if (findImmediateWinMove(next, enemy)) continue;

        // 开局低级冒进，剔除
        if (isOpeningOverextension(b, move, color)) continue;

        const check = isInCheck(next, enemy);
        const gain = target ? (baseValue[target.type] || 0) : 0;
        const risk = landingSquareRisk(next, move.to.r, move.to.c, color);
        const exposed = exposedMajorPieceRisk(b, next, color);

        // 快速粗筛：只杀明显送大子的招，不做重型 opponentPunish/SEE。
        if (!check && gain < 300 && risk > 520) continue;
        if (!check && gain < 420 && exposed > 680) continue;
        if (p.type === "r" && !target && risk > 260) continue;

        safe.push(move);
      }

      return safe.length ? safe : moves;
    }

    function fastRootMoveScore(b, move, color) {
      const p = b[move.from.r][move.from.c];
      const target = b[move.to.r][move.to.c];
      if (!p) return -INF;

      const next = applyMoveToClone(b, move);
      const enemy = opposite(color);
      let score = 0;

      if (target) {
        score += (baseValue[target.type] || 0) * 1.35 - (baseValue[p.type] || 0) * 0.08;
        score += dangerousPawnBonus(target, move.to.r, move.to.c, color) * 1.25;
        score += pawnContactBonus(p, target) * 1.35;
        score += Math.max(0, staticExchangeEval(b, move, color)) * 0.75;
      }
      if (isOpeningOverextension(b, move, color)) score -= 1800;
      if (isInCheck(next, enemy)) score += 420;
      if (createsBigThreat(next, move.to.r, move.to.c, color)) score += 220;

      const before = positionalBonus(b, p, move.from.r, move.from.c, gamePhase(b));
      const after = positionalBonus(next, p, move.to.r, move.to.c, gamePhase(next));
      score += (after - before) * 3.2;

      score += getLearnScoreForMove(b, color, move) * 90;
      score -= landingSquareRisk(next, move.to.r, move.to.c, color) * 1.5;
      score -= exposedMajorPieceRisk(b, next, color) * 0.55;

      if (moveRecords.length < 12) {
        if (p.type === "r" && !target) score -= 170;
        if (p.type === "n" || p.type === "c") score += 70;
        if (p.type === "p" && [2, 4, 6].includes(move.from.c)) score += 35;
      }

      return score;
    }

    function limitRootCandidates(b, moves, color, limit = 16) {
      if (!moves || moves.length <= limit) return moves;
      return moves
        .map(move => ({ move, score: fastRootMoveScore(b, move, color) }))
        .sort((a, z) => z.score - a.score)
        .slice(0, limit)
        .map(x => x.move);
    }

    function putMoveFirst(moves, firstMove) {
      if (!firstMove) return moves;
      const index = moves.findIndex(m => sameMove(m, firstMove));
      if (index <= 0) return moves;
      const copy = moves.slice();
      const [m] = copy.splice(index, 1);
      copy.unshift(m);
      return copy;
    }

    function chooseAiMove(b, aiColor, difficulty) {
      let moves = generateAllLegalMoves(b, aiColor);
      if (moves.length === 0) return null;

      const profile = AI_LEVELS[difficulty] || AI_LEVELS[3];

      // 先找自己的一步杀/一步胜。这个优先级最高。
      const immediateWin = findImmediateWinMove(b, aiColor, moves);
      if (immediateWin) return immediateWin;

      // 低级错误修复：如果对方有危险过河兵/白送子，先吃掉。
      const urgentCapture = findUrgentCaptureMove(b, aiColor, moves);
      if (urgentCapture) return urgentCapture;

      // 极速安全筛选：只做必要的防一步杀、防明显送大子，避免每步卡顿。
      moves = filterFastRootBlunders(b, moves, aiColor);

      // 高难度才使用较重的大师候选筛选；低难度追求流畅。
      if (difficulty >= 4) moves = masterCandidateGate(b, moves, aiColor);

      // 控制根节点候选数量，速度提升最明显。
      moves = limitRootCandidates(b, moves, aiColor, profile.rootLimit || 16);

      // 再过滤“我走完后，对方下一步就能杀”的招，防止漏防一步杀。
      const notAllowMate = moves.filter(m => !allowsImmediateWin(b, m, aiColor));
      if (notAllowMate.length) moves = notAllowMate;

      const tacticalShot = findImmediateTacticalMove(b, aiColor, moves);
      if (tacticalShot) return tacticalShot;

      const bookMove = chooseOpeningBookMove(b, aiColor, moves);
      // 开局库只在最开始几手使用，且必须通过安全检查；后面交给搜索，避免机械走谱送大子。
      if (bookMove && moveRecords.length < 4 && !isObviousBlunder(b, bookMove, aiColor)) return bookMove;

      const learnedMove = chooseLearnedMove(b, aiColor, moves);
      // 经验招也必须安全；困难/大师更相信搜索，不盲走经验表。
      if (learnedMove && difficulty <= 2 && moveRecords.length < 16 && Math.random() < 0.55 && !isObviousBlunder(b, learnedMove, aiColor)) return learnedMove;

      tt.clear();
      killerMoves = Array.from({ length: 96 }, () => []);
      historyHeuristic.clear();
      searchDeadline = performance.now() + profile.timeMs;
      searchStopped = false;
      nodes = 0;
      currentPvMove = null;

      // AlphaZero-like root MCTS: 先用 policy/value 做一次根节点搜索，
      // 再把结果作为 Alpha-Beta 的主变提示，减少低级漏招并更像“大局观”选点。
      const mctsHint = difficulty >= 4 ? chooseAlphaZeroStyleMove(b, aiColor, moves, profile) : null;
      if (mctsHint) currentPvMove = mctsHint;

      let rootOrdered = orderMoves(b, moves, aiColor, aiColor, 0, mctsHint);
      let bestMove = mctsHint || rootOrdered[0];
      let bestScore = -INF;

      for (let depth = 1; depth <= profile.depth; depth++) {
        let localBest = bestMove;
        let localScore = -INF;

        // aspiration window
        let alpha = depth >= 4 ? bestScore - 350 : -INF;
        let beta = depth >= 4 ? bestScore + 350 : INF;

        for (let attempt = 0; attempt < 2; attempt++) {
          localScore = -INF;
          searchStopped = false;

          const ordered = putMoveFirst(rootOrdered, bestMove);
          for (const move of ordered) {
            const next = applyMoveToClone(b, move);
            const score = -negamax(next, depth - 1, -beta, -alpha, opposite(aiColor), aiColor, 1, true, profile);
            if (searchStopped) break;

            if (score > localScore) {
              localScore = score;
              localBest = move;
              if (depth === profile.depth) currentPvMove = move;
            }
            alpha = Math.max(alpha, localScore);
          }

          if (searchStopped) break;

          if (localScore <= alpha || localScore >= beta) {
            alpha = -INF;
            beta = INF;
            continue;
          }
          break;
        }

        if (searchStopped) break;
        bestMove = localBest;
        bestScore = localScore;

        // 找到明显杀棋就提前走
        if (bestScore > MATE / 2) break;
      }

      if (profile.randomNoise > 0 && Math.random() * 100 < profile.randomNoise) {
        const good = orderMoves(b, moves, aiColor, aiColor, 0, bestMove).slice(0, Math.min(4, moves.length));
        return good[Math.floor(Math.random() * good.length)];
      }

      if (isObviousBlunder(b, bestMove, aiColor) || allowsImmediateWin(b, bestMove, aiColor)) {
        const fallback = orderMoves(b, moves, aiColor, aiColor, 0, bestMove)
          .find(m => !isObviousBlunder(b, m, aiColor) && !allowsImmediateWin(b, m, aiColor));
        if (fallback) bestMove = fallback;
      }

      console.log("AI nodes:", nodes, "score:", bestScore, "move:", moveKey(bestMove));
      return bestMove;
    }

    function negamax(b, depth, alpha, beta, side, aiColor, ply, allowNullMove, profile) {
      if (shouldStop()) {
        searchStopped = true;
        return evaluateRelative(b, side);
      }

      const sideKing = findKing(b, side);
      const enemyKing = findKing(b, opposite(side));
      if (!sideKing) return -MATE + ply;
      if (!enemyKing) return MATE - ply;

      const inCheck = isInCheck(b, side);

      // 将军延伸：避免漏掉连续将杀
      if (inCheck && depth < 7) depth += 1;

      if (depth <= 0) return quiescence(b, alpha, beta, side, ply, 0, profile);

      const originalAlpha = alpha;
      const key = hashBoard(b, side);
      const cached = tt.get(key);
      if (cached && cached.depth >= depth) {
        if (cached.flag === "exact") return cached.value;
        if (cached.flag === "lower") alpha = Math.max(alpha, cached.value);
        if (cached.flag === "upper") beta = Math.min(beta, cached.value);
        if (alpha >= beta) return cached.value;
      }

      const staticEvalEarly = evaluateRelative(b, side);

      // Razoring/Futility：明显落后且深度很浅时，直接进入静态搜索，节省时间给主线。
      if (!inCheck && depth <= 2 && staticEvalEarly + 420 * depth <= alpha) {
        return quiescence(b, alpha, beta, side, ply, 0, profile);
      }

      // Static null-move pruning：明显足够好时提前截断。
      if (!inCheck && depth <= 2 && staticEvalEarly - 520 * depth >= beta) {
        return staticEvalEarly;
      }

      // Null Move Pruning：中盘大幅提速；残局/被将军不用
      if (allowNullMove && depth >= 3 && !inCheck && hasMajorMaterial(b, side) && totalMaterial(b) > 3600) {
        const reduction = depth >= 6 ? 3 : 2;
        const score = -negamax(b, depth - 1 - reduction, -beta, -beta + 1, opposite(side), aiColor, ply + 1, false, profile);
        if (!searchStopped && score >= beta) return score;
      }

      let moves = generateAllLegalMoves(b, side);
      if (moves.length === 0) return -MATE + ply;

      if (depth >= 2 && ply <= 4) {
        const winMove = findImmediateWinMove(b, side, moves);
        if (winMove) return MATE - ply;
      }

      const ttMove = cached ? cached.bestMove : null;
      moves = orderMoves(b, moves, side, aiColor, ply, ttMove);

      let bestMove = moves[0];
      let bestScore = -INF;
      let quietCount = 0;
      const staticEval = evaluateRelative(b, side);

      for (let i = 0; i < moves.length; i++) {
        const move = moves[i];
        const tactical = isTacticalMove(b, move, side);
        const quiet = !tactical;

        if (!inCheck && quiet && depth <= 2 && quietCount++ > profile.maxQuiet) continue;
        if (!inCheck && quiet && depth <= 2 && staticEval + 180 * depth <= alpha) continue;

        const movingPiece = b[move.from.r][move.from.c];
        const capturedPiece = b[move.to.r][move.to.c];
        const next = applyMoveToClone(b, move);
        const givesCheck = isInCheck(next, opposite(side));
        let newDepth = depth - 1;
        let reduced = false;

        // Late Move Reduction：只减少靠后的安静招，吃子/将军/威胁不减。
        if (!inCheck && !givesCheck && quiet && depth >= 3 && i >= 5) {
          newDepth -= depth >= 6 && i >= 12 ? 2 : 1;
          if (newDepth < 0) newDepth = 0;
          reduced = true;
        }

        // 走出将军或连续将军时延伸，减少漏杀。
        if (givesCheck && newDepth < depth) newDepth += 1;

        // 重要吃子、主变招略微延伸，让 AI 更少漏掉兑子后的战术。
        if (capturedPiece && baseValue[capturedPiece.type] >= 450 && newDepth < depth) newDepth += 1;
        if (i === 0 && depth >= 5 && currentPvMove && sameMove(move, currentPvMove) && newDepth < depth) newDepth += 1;

        let score;
        if (i === 0) {
          score = -negamax(next, newDepth, -beta, -alpha, opposite(side), aiColor, ply + 1, true, profile);
        } else {
          // PVS / Principal Variation Search：非首选招先用窄窗口验证。
          score = -negamax(next, newDepth, -alpha - 1, -alpha, opposite(side), aiColor, ply + 1, true, profile);
          if (!searchStopped && score > alpha && score < beta) {
            score = -negamax(next, newDepth, -beta, -alpha, opposite(side), aiColor, ply + 1, true, profile);
          }
        }

        if (!searchStopped && reduced && score > alpha) {
          score = -negamax(next, depth - 1, -beta, -alpha, opposite(side), aiColor, ply + 1, true, profile);
        }

        if (searchStopped) break;

        if (score > bestScore) {
          bestScore = score;
          bestMove = move;
        }

        alpha = Math.max(alpha, score);
        if (alpha >= beta) {
          rememberCutoff(move, depth, ply, tactical);
          break;
        }
      }

      let flag = "exact";
      if (bestScore <= originalAlpha) flag = "upper";
      else if (bestScore >= beta) flag = "lower";

      tt.set(key, { depth, value: bestScore, flag, bestMove });
      return bestScore;
    }

    function quiescence(b, alpha, beta, side, ply, qDepth, profile) {
      if (shouldStop()) {
        searchStopped = true;
        return evaluateRelative(b, side);
      }

      const inCheck = isInCheck(b, side);
      const standPat = evaluateRelative(b, side);

      if (!inCheck) {
        if (standPat >= beta) return standPat;
        alpha = Math.max(alpha, standPat);
      }

      if (qDepth >= 10 && !inCheck) return standPat;

      let moves = inCheck ? generateAllLegalMoves(b, side) : generateTacticalMoves(b, side);
      if (moves.length === 0) return inCheck ? -MATE + ply : standPat;

      if (inCheck || qDepth <= 1) {
        const winMove = findImmediateWinMove(b, side, moves);
        if (winMove) return MATE - ply;
      }

      moves = orderMoves(b, moves, side, side, ply, null);

      for (const move of moves) {
        const captured = b[move.to.r][move.to.c];

        // Delta pruning：静态搜索中，明显追不回 alpha 的小吃子不搜。
        if (!inCheck && captured && qDepth >= 1) {
          const margin = baseValue[captured.type] + 260;
          if (standPat + margin < alpha) continue;
        }

        // 坏吃子剪枝：吃完马上白丢大子，且不是将军时跳过。
        if (!inCheck && captured) {
          const gain = captureStaticGain(b, move, side);
          if (gain < -180) continue;
        }

        const next = applyMoveToClone(b, move);
        const score = -quiescence(next, -beta, -alpha, opposite(side), ply + 1, qDepth + 1, profile);
        if (score >= beta) return score;
        if (score > alpha) alpha = score;
      }

      return alpha;
    }

    function shouldStop() {
      nodes++;
      return (nodes & 1023) === 0 && performance.now() > searchDeadline;
    }

    function evaluateRelative(b, side) {
      return evaluateAbsolute(b, side) - evaluateAbsolute(b, opposite(side));
    }

    function evaluateAbsolute(b, color) {
      let score = 0;
      let advisors = 0;
      let elephants = 0;
      let phase = gamePhase(b);

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = b[r][c];
          if (!p || p.color !== color) continue;

          if (p.type === "a") advisors++;
          if (p.type === "b") elephants++;

          score += baseValue[p.type];
          score += positionalBonus(b, p, r, c, phase);
          score += getPseudoMoves(b, r, c).length * mobilityWeight[p.type];
          score += pieceSafety(b, r, c, color);
        }
      }

      score += kingSafety(b, color, advisors, elephants);
      score += attackPressure(b, color);
      score += formationBonus(b, color);
      score += advancedStructureBonus(b, color, phase);
      score += modelValueBonus(b, color);
      score += learnedPositionBonus(b, color);

      if (isInCheck(b, color)) score -= 120;

      return score;
    }

    function gamePhase(b) {
      let material = 0;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = b[r][c];
          if (p && p.type !== "k" && p.type !== "a" && p.type !== "b" && p.type !== "p") material += baseValue[p.type];
        }
      }
      return Math.max(0, Math.min(1, material / 5900));
    }

    function positionalBonus(b, p, r, c, phase) {
      const center = 18 - Math.abs(c - 4) * 4;
      const forward = p.color === "red" ? 9 - r : r;
      const crossed = hasCrossedRiver(p.color, r);

      switch (p.type) {
        case "p":
          return forward * 20 + (crossed ? 95 : 0) + center * (crossed ? 3 : 1);
        case "n":
          return center * 4 + forward * 4 - edgePenalty(r, c) * 18 + horseOutpostBonus(b, r, c, p.color);
        case "c":
          return center * 2 + 25 + cannonThreatBonus(b, r, c, p.color) + (1 - phase) * 20;
        case "r":
          return center + 45 + rookActivityBonus(b, r, c, p.color);
        case "a":
          return inPalace(r, c, p.color) ? 15 : -50;
        case "b":
          return 12 + elephantShapeBonus(b, r, c, p.color);
        case "k":
          return kingPositionBonus(p.color, r, c, phase);
        default:
          return 0;
      }
    }

    function edgePenalty(r, c) {
      let p = 0;
      if (c === 0 || c === 8) p++;
      if (r === 0 || r === 9) p++;
      return p;
    }

    function horseOutpostBonus(b, r, c, color) {
      let bonus = 0;
      const enemy = opposite(color);
      if (hasCrossedRiver(color, r)) bonus += 25;
      if (!isSquareAttacked(b, r, c, enemy) || isSquareAttacked(b, r, c, color, true)) bonus += 18;
      return bonus;
    }

    function rookActivityBonus(b, r, c, color) {
      let bonus = 0;
      for (const [dr, dc] of [[1,0], [-1,0], [0,1], [0,-1]]) {
        let nr = r + dr, nc = c + dc;
        let empty = 0;
        while (inBounds(nr, nc) && !b[nr][nc]) {
          empty++;
          nr += dr;
          nc += dc;
        }
        bonus += Math.min(28, empty * 4);
        if (inBounds(nr, nc) && b[nr][nc].color !== color) bonus += Math.min(45, baseValue[b[nr][nc].type] / 20);
      }
      return bonus;
    }

    function cannonThreatBonus(b, r, c, color) {
      let bonus = 0;
      for (const [dr, dc] of [[1,0], [-1,0], [0,1], [0,-1]]) {
        let nr = r + dr, nc = c + dc;
        let screens = 0;
        while (inBounds(nr, nc)) {
          const p = b[nr][nc];
          if (p) {
            screens++;
            if (screens === 2) {
              if (p.color !== color) bonus += Math.min(90, baseValue[p.type] / 10);
              break;
            }
          }
          nr += dr;
          nc += dc;
        }
      }
      return bonus;
    }

    function elephantShapeBonus(b, r, c, color) {
      let bonus = 0;
      const homeRows = color === "red" ? [5, 7, 9] : [0, 2, 4];
      if (homeRows.includes(r)) bonus += 8;
      if (c === 2 || c === 6) bonus += 8;
      return bonus;
    }

    function kingPositionBonus(color, r, c, phase) {
      const homeRow = color === "red" ? 9 : 0;
      let score = 0;
      if (c === 4) score += 22;
      else score -= 18;
      if (r === homeRow) score += 24 * phase;
      return score;
    }

    function pieceSafety(b, r, c, color) {
      const p = b[r][c];
      if (!p || p.type === "k") return 0;

      const enemy = opposite(color);
      const lowestEnemy = lowestAttackerValue(b, r, c, enemy);
      if (!Number.isFinite(lowestEnemy)) {
        return isSquareAttacked(b, r, c, color, true) ? 12 : 0;
      }

      const lowestDefender = lowestAttackerValue(b, r, c, color, true);
      const defended = Number.isFinite(lowestDefender);
      const value = baseValue[p.type] || 0;

      let penalty = Math.max(80, value - lowestEnemy * 0.45);
      penalty = Math.min(620, penalty);

      if (defended) penalty *= 0.48;
      if (p.type === "p") penalty *= 0.38;
      if (p.type === "a" || p.type === "b") penalty *= 0.66;

      // 大子被小子攻击且保护不足，必须重罚，避免明显送车送炮送马。
      if (["r", "c", "n"].includes(p.type) && lowestEnemy <= 250 && !defended) {
        penalty += value * 0.45;
      }

      return -penalty;
    }

    function kingSafety(b, color, advisors, elephants) {
      const king = findKing(b, color);
      if (!king) return -MATE;
      let score = advisors * 58 + elephants * 42;

      const enemy = opposite(color);
      if (filePressureOnKing(b, king.r, king.c, enemy)) score -= 150;
      if (palaceWeakness(b, color)) score -= 60;
      if (isSquareAttacked(b, king.r, king.c, enemy)) score -= 200;

      return score;
    }

    function palaceWeakness(b, color) {
      const rows = color === "red" ? [7, 8, 9] : [0, 1, 2];
      let defenders = 0;
      for (const r of rows) {
        for (let c = 3; c <= 5; c++) {
          const p = b[r][c];
          if (p && p.color === color && (p.type === "a" || p.type === "k")) defenders++;
        }
      }
      return defenders <= 2;
    }

    function filePressureOnKing(b, kr, kc, enemy) {
      for (const dr of [-1, 1]) {
        let nr = kr + dr;
        let screens = 0;
        while (inBounds(nr, kc)) {
          const p = b[nr][kc];
          if (p) {
            if (p.color === enemy && p.type === "r" && screens === 0) return true;
            if (p.color === enemy && p.type === "c" && screens === 1) return true;
            screens++;
          }
          nr += dr;
        }
      }
      return false;
    }

    function attackPressure(b, color) {
      let score = 0;
      const enemy = opposite(color);
      const enemyKing = findKing(b, enemy);

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = b[r][c];
          if (!p || p.color !== color) continue;

          const moves = getPseudoMoves(b, r, c);
          for (const m of moves) {
            const target = b[m.r][m.c];
            if (target && target.color === enemy) score += Math.min(150, baseValue[target.type] / 12);
          }

          if (enemyKing) {
            const dist = Math.abs(r - enemyKing.r) + Math.abs(c - enemyKing.c);
            if (["r", "c", "n", "p"].includes(p.type)) score += Math.max(0, 32 - dist * 3);
          }
        }
      }

      return score;
    }

    function formationBonus(b, color) {
      let score = 0;

      // 双车/车炮占中线与肋道奖励
      for (let c of [3, 4, 5]) {
        let hasRook = false, hasCannon = false;
        for (let r = 0; r < ROWS; r++) {
          const p = b[r][c];
          if (p && p.color === color && p.type === "r") hasRook = true;
          if (p && p.color === color && p.type === "c") hasCannon = true;
        }
        if (hasRook) score += 22;
        if (hasRook && hasCannon) score += 38;
      }

      // 过河兵、连兵、逼近九宫奖励。
      let crossedPawns = 0;
      const enemyKing = findKing(b, opposite(color));
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = b[r][c];
          if (!p || p.color !== color || p.type !== "p") continue;
          if (hasCrossedRiver(color, r)) {
            crossedPawns++;
            score += 22;
            if (enemyKing) {
              const dist = Math.abs(r - enemyKing.r) + Math.abs(c - enemyKing.c);
              score += Math.max(0, 70 - dist * 10);
            }
            for (const dc of [-1, 1]) {
              const q = b[r]?.[c + dc];
              if (q && q.color === color && q.type === "p") score += 20;
            }
          }
        }
      }
      score += crossedPawns * 14;

      return score;
    }



    function enemyDangerousPawnPressure(b, color) {
      const enemy = opposite(color);
      let penalty = 0;
      const king = findKing(b, color);

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = b[r][c];
          if (!p || p.color !== enemy || p.type !== "p") continue;

          if (hasCrossedRiver(enemy, r)) penalty += 45;
          if ([3, 4, 5].includes(c)) penalty += 22;

          if (king) {
            const dist = Math.abs(r - king.r) + Math.abs(c - king.c);
            penalty += Math.max(0, 85 - dist * 12);
          }

          // 图中这种：红兵连进到黑方河界附近，必须重视。
          if (color === "black" && enemy === "red" && r <= 4) penalty += 60;
          if (color === "red" && enemy === "black" && r >= 5) penalty += 60;
        }
      }

      return penalty;
    }

    function advancedStructureBonus(b, color, phase) {
      let score = 0;
      const enemy = opposite(color);
      const enemyKing = findKing(b, enemy);
      const ownKing = findKing(b, color);

      // 对方危险过河兵必须惩罚，避免 AI 无视兵卒推进。
      score -= enemyDangerousPawnPressure(b, color);

      // 兵卒靠近九宫，尤其有车炮马配合时价值更高。
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = b[r][c];
          if (!p || p.color !== color) continue;

          if (p.type === "p") {
            const advance = color === "red" ? 9 - r : r;
            const palacePressure = enemyKing ? Math.max(0, 6 - (Math.abs(r - enemyKing.r) + Math.abs(c - enemyKing.c))) : 0;
            score += advance * 4 + palacePressure * 18;
            if (hasCrossedRiver(color, r) && (c === 3 || c === 4 || c === 5)) score += 28;
          }

          // 马被困、车炮被边线困住都降低。
          const mobility = getPseudoMoves(b, r, c).length;
          if (p.type === "n" && mobility <= 2) score -= 55;
          if (p.type === "r" && mobility <= 4) score -= 45;
          if (p.type === "c" && mobility <= 3) score -= 28;

          // 车、炮、马进入对方半场并靠近将帅，给攻击分。
          if (enemyKing && ["r", "c", "n"].includes(p.type)) {
            const dist = Math.abs(r - enemyKing.r) + Math.abs(c - enemyKing.c);
            const crossed = hasCrossedRiver(color, r);
            score += Math.max(0, 70 - dist * 8) + (crossed ? 24 : 0);
          }
        }
      }

      // 车炮同线压将、车马炮集中在九宫附近。
      if (enemyKing) {
        score += lineAttackToKingBonus(b, color, enemyKing);
        score += palaceAttackNetBonus(b, color, enemyKing);
      }

      // 残局时将帅活跃略微有用，但不能离宫，这里只奖励中路安全。
      if (ownKing && phase < 0.35 && ownKing.c === 4) score += 18;

      return score;
    }

    function lineAttackToKingBonus(b, color, enemyKing) {
      let score = 0;
      const kr = enemyKing.r, kc = enemyKing.c;

      // 同列车炮压力
      for (const dr of [-1, 1]) {
        let r = kr + dr;
        let screens = 0;
        while (inBounds(r, kc)) {
          const p = b[r][kc];
          if (p) {
            if (p.color === color && p.type === "r" && screens === 0) score += 120;
            if (p.color === color && p.type === "c" && screens === 1) score += 140;
            screens++;
          }
          r += dr;
        }
      }

      // 同行车炮压肋道
      for (const dc of [-1, 1]) {
        let c = kc + dc;
        let screens = 0;
        while (inBounds(kr, c)) {
          const p = b[kr][c];
          if (p) {
            if (p.color === color && p.type === "r" && screens === 0) score += 70;
            if (p.color === color && p.type === "c" && screens === 1) score += 80;
            screens++;
          }
          c += dc;
        }
      }

      return score;
    }

    function palaceAttackNetBonus(b, color, enemyKing) {
      let score = 0;
      const palaceRows = enemyKing.color === "red" ? [7, 8, 9] : [0, 1, 2];

      for (const r of palaceRows) {
        for (let c = 3; c <= 5; c++) {
          if (!inBounds(r, c)) continue;
          if (isSquareAttacked(b, r, c, color)) score += 18;
        }
      }

      return Math.min(score, 180);
    }


    function defaultAiModel() {
      return {
        version: 1,
        games: 0,
        lr: 0.035,
        weights: {
          material: 0.22,
          mobility: 0.09,
          safety: 0.16,
          attack: 0.14,
          king: 0.12,
          pawn: 0.10,
          line: 0.10,
          center: 0.05,
          phase: 0.02,
          prophylaxis: 0.16,
          coordination: 0.12,
          initiative: 0.13
        },
        policy: {
          capture: 0.22,
          check: 0.18,
          threat: 0.15,
          safe: 0.20,
          develop: 0.10,
          center: 0.08,
          pawnAdvance: 0.05,
          prophylaxis: 0.16,
          coordination: 0.12
        }
      };
    }

    function loadAiModel() {
      try {
        const saved = JSON.parse(localStorage.getItem(MODEL_KEY) || "null");
        const base = defaultAiModel();
        if (!saved || typeof saved !== "object") return base;
        return {
          ...base,
          ...saved,
          weights: { ...base.weights, ...(saved.weights || {}) },
          policy: { ...base.policy, ...(saved.policy || {}) }
        };
      } catch {
        return defaultAiModel();
      }
    }

    function saveAiModel() {
      try {
        localStorage.setItem(MODEL_KEY, JSON.stringify(aiModel));
      } catch {}
    }

    function extractModelFeatures(b, color) {
      const enemy = opposite(color);
      const phase = gamePhase(b);
      const material = materialScore(b, color) - materialScore(b, enemy);
      const mobility = sideMobilityScore(b, color) - sideMobilityScore(b, enemy);
      const safety = sideSafetyScore(b, color) - sideSafetyScore(b, enemy);
      const attack = attackPressure(b, color) - attackPressure(b, enemy);
      const king = kingSafetyFeature(b, color) - kingSafetyFeature(b, enemy);
      const pawn = pawnFeature(b, color) - pawnFeature(b, enemy);
      const line = lineFeature(b, color) - lineFeature(b, enemy);
      const center = centerControlFeature(b, color) - centerControlFeature(b, enemy);
      const prophylaxis = prophylaxisFeature(b, color) - prophylaxisFeature(b, enemy);
      const coordination = coordinationFeature(b, color) - coordinationFeature(b, enemy);
      const initiative = initiativeFeature(b, color) - initiativeFeature(b, enemy);

      return {
        material: clampFeature(material / 2200),
        mobility: clampFeature(mobility / 120),
        safety: clampFeature(safety / 1000),
        attack: clampFeature(attack / 900),
        king: clampFeature(king / 500),
        pawn: clampFeature(pawn / 360),
        line: clampFeature(line / 450),
        center: clampFeature(center / 120),
        phase: clampFeature((phase - 0.5) * 2),
        prophylaxis: clampFeature(prophylaxis / 900),
        coordination: clampFeature(coordination / 520),
        initiative: clampFeature(initiative / 650)
      };
    }

    function clampFeature(x) {
      if (!Number.isFinite(x)) return 0;
      return Math.max(-1, Math.min(1, x));
    }

    function materialScore(b, color) {
      let score = 0;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = b[r][c];
          if (p && p.color === color && p.type !== "k") score += baseValue[p.type] || 0;
        }
      }
      return score;
    }

    function sideMobilityScore(b, color) {
      let score = 0;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = b[r][c];
          if (!p || p.color !== color) continue;
          score += getPseudoMoves(b, r, c).length * (mobilityWeight[p.type] || 1);
        }
      }
      return score;
    }

    function sideSafetyScore(b, color) {
      let score = 0;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = b[r][c];
          if (p && p.color === color) score += pieceSafety(b, r, c, color);
        }
      }
      return score;
    }

    function kingSafetyFeature(b, color) {
      let advisors = 0;
      let elephants = 0;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = b[r][c];
          if (!p || p.color !== color) continue;
          if (p.type === "a") advisors++;
          if (p.type === "b") elephants++;
        }
      }
      return kingSafety(b, color, advisors, elephants);
    }

    function pawnFeature(b, color) {
      let score = 0;
      const enemyKing = findKing(b, opposite(color));
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = b[r][c];
          if (!p || p.color !== color || p.type !== "p") continue;
          const advance = color === "red" ? 9 - r : r;
          score += advance * 12 + (hasCrossedRiver(color, r) ? 55 : 0);
          if (enemyKing) {
            const dist = Math.abs(r - enemyKing.r) + Math.abs(c - enemyKing.c);
            score += Math.max(0, 45 - dist * 7);
          }
        }
      }
      return score;
    }

    function lineFeature(b, color) {
      const enemyKing = findKing(b, opposite(color));
      return enemyKing ? lineAttackToKingBonus(b, color, enemyKing) : 0;
    }

    function centerControlFeature(b, color) {
      let score = 0;
      const points = [[4,4], [5,4], [4,3], [4,5], [5,3], [5,5]];
      for (const [r, c] of points) {
        if (isSquareAttacked(b, r, c, color)) score += 15;
      }
      return score;
    }


    function prophylaxisFeature(b, color) {
      // 大师思路之一：先看对手最强威胁，能提前化解就很重要。
      const enemy = opposite(color);
      const enemyThreat = strongestTacticalThreat(b, enemy);
      const ownThreat = strongestTacticalThreat(b, color);
      return ownThreat.score * 0.55 - enemyThreat.score;
    }

    function coordinationFeature(b, color) {
      // 子力协同：大子互相保护、集中控制中路和九宫附近。
      let score = 0;
      const enemyKing = findKing(b, opposite(color));

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = b[r][c];
          if (!p || p.color !== color) continue;

          const defended = isSquareAttacked(b, r, c, color, true);
          if (defended && ["r", "c", "n"].includes(p.type)) score += 42;
          if (!defended && ["r", "c", "n"].includes(p.type)) score -= 35;

          const moves = getPseudoMoves(b, r, c).length;
          if (p.type === "n" && moves >= 5) score += 28;
          if (p.type === "r" && moves >= 9) score += 36;
          if (p.type === "c" && moves >= 8) score += 26;

          if (enemyKing && ["r", "c", "n", "p"].includes(p.type)) {
            const dist = Math.abs(r - enemyKing.r) + Math.abs(c - enemyKing.c);
            if (dist <= 5) score += 34;
          }
        }
      }

      // 双车炮马围绕中肋道配合。
      for (const c of [3, 4, 5]) {
        let major = 0;
        for (let r = 0; r < ROWS; r++) {
          const p = b[r][c];
          if (p && p.color === color && ["r", "c", "n"].includes(p.type)) major++;
        }
        if (major >= 2) score += 55;
      }

      return score;
    }

    function initiativeFeature(b, color) {
      // 主动权：将军、威胁大子、限制对方行动力。
      const enemy = opposite(color);
      let score = 0;
      if (isInCheck(b, enemy)) score += 120;
      score += strongestTacticalThreat(b, color).score * 0.7;
      score -= sideMobilityScore(b, enemy) * 0.8;
      return score;
    }

    function modelValueBonus(b, color) {
      const f = extractModelFeatures(b, color);
      let value = 0;
      for (const [name, x] of Object.entries(f)) {
        value += (aiModel.weights[name] || 0) * x;
      }
      return value * 420;
    }

    function modelPolicyPrior(b, move, color) {
      const p = b[move.from.r][move.from.c];
      if (!p) return 0;
      const target = b[move.to.r][move.to.c];
      const next = applyMoveToClone(b, move);
      const enemy = opposite(color);
      const pol = aiModel.policy;

      let score = 0;
      if (target) score += (pol.capture || 0) * Math.min(1, (baseValue[target.type] || 0) / 1000);
      if (isInCheck(next, enemy)) score += pol.check || 0;
      if (createsBigThreat(next, move.to.r, move.to.c, color)) score += pol.threat || 0;

      const risk = landingSquareRisk(next, move.to.r, move.to.c, color);
      score += (pol.safe || 0) * (risk <= 0 ? 1 : -Math.min(1, risk / 900));

      if (["n", "c"].includes(p.type) && !hasCrossedRiver(color, move.from.r)) score += pol.develop || 0;
      if ([3, 4, 5].includes(move.to.c)) score += pol.center || 0;
      if (p.type === "p" && hasCrossedRiver(color, move.to.r)) score += pol.pawnAdvance || 0;

      score += (pol.prophylaxis || 0) * clampFeature(masterDefenseBonus(b, move, color) / 900);
      score += (pol.coordination || 0) * masterStyleMoveBonus(b, move, color);

      return score;
    }

    function trainAiModelFromHistory(hist, winner) {
      if (!hist || !hist.length) return;
      const lr = aiModel.lr || 0.03;

      for (let i = 0; i < hist.length; i++) {
        const item = hist[i];
        if (!item.features) continue;

        const result = winner ? (item.color === winner ? 1 : -1) : 0;
        const decay = Math.max(0.25, 1 - i / Math.max(60, hist.length * 1.6));
        const prediction = predictFromFeatures(item.features);
        const error = (result - prediction) * decay;

        for (const [name, x] of Object.entries(item.features)) {
          aiModel.weights[name] = clampWeight((aiModel.weights[name] || 0) + lr * error * x);
        }

        // 赢棋方的实际着法会轻微增强策略先验；输棋方会减弱。
        const direction = result * decay * lr * 0.45;
        if (direction !== 0) {
          tunePolicyFromMoveKey(item.move, direction);
        }
      }

      aiModel.games = (aiModel.games || 0) + 1;
      saveAiModel();
    }

    function predictFromFeatures(features) {
      let s = 0;
      for (const [name, x] of Object.entries(features)) {
        s += (aiModel.weights[name] || 0) * x;
      }
      return Math.tanh(s);
    }

    function clampWeight(x) {
      return Math.max(-1.5, Math.min(1.5, x));
    }

    function tunePolicyFromMoveKey(moveKeyText, delta) {
      // 只根据走法形态做轻量调参，避免模型过拟合单一局面。
      if (!moveKeyText || moveKeyText.length < 4) return;
      const fr = Number(moveKeyText[0]);
      const fc = Number(moveKeyText[1]);
      const tr = Number(moveKeyText[2]);
      const tc = Number(moveKeyText[3]);
      if (![fr, fc, tr, tc].every(Number.isFinite)) return;

      const forwardLike = Math.abs(tr - fr) + Math.abs(tc - fc);
      aiModel.policy.center = clampWeight((aiModel.policy.center || 0) + delta * ([3,4,5].includes(tc) ? 0.45 : -0.08));
      aiModel.policy.develop = clampWeight((aiModel.policy.develop || 0) + delta * (forwardLike >= 1 ? 0.18 : 0));
      aiModel.policy.safe = clampWeight((aiModel.policy.safe || 0) + delta * 0.10);
    }

    function learnedPositionBonus(b, color) {
      const key = learningKey(b, color);
      const bucket = learnBook[key];
      if (!bucket) return 0;
      let best = 0;
      for (const mv of Object.keys(bucket)) best = Math.max(best, bucket[mv]);
      return Math.max(-120, Math.min(120, best * 18));
    }





    function strongestTacticalThreat(b, attackerColor) {
      const moves = generateAllLegalMoves(b, attackerColor);
      let best = { score: 0, move: null, target: null, kind: "" };
      const defender = opposite(attackerColor);

      for (const move of moves) {
        const target = b[move.to.r][move.to.c];
        const next = applyMoveToClone(b, move);
        let score = 0;
        let kind = "";

        if (target) {
          score += Math.max(0, captureStaticGain(b, move, attackerColor));
          if (["r", "c", "n"].includes(target.type)) score += 260;
          kind = "capture";
        }

        if (isInCheck(next, defender)) {
          const replies = generateAllLegalMoves(next, defender).length;
          score += replies <= 1 ? 1500 : 420;
          kind = "check";
        }

        if (createsBigThreat(next, move.to.r, move.to.c, attackerColor)) {
          score += 360;
          kind = kind || "threat";
        }

        if (score > best.score) best = { score, move, target, kind };
      }

      return best;
    }

    function masterDefenseBonus(b, move, color) {
      // 大师常见思路：有威胁先解威胁，而不是只看自己能走什么。
      const enemy = opposite(color);
      const before = strongestTacticalThreat(b, enemy).score;
      if (before < 260) return 0;

      const next = applyMoveToClone(b, move);
